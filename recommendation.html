<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Recommendations | Career Course Compass</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Get personalized course and career recommendations based on your stream and percentage.">
    <link rel="stylesheet" href="design-system.css">
    <style>
        .container { max-width: 900px; margin: 0 auto; padding: 32px 24px; }

        /* ─── HEADER ─── */
        .page-header { margin-bottom: 32px; }
        .page-header h1 { font-size: 24px; margin-bottom: 4px; }
        .page-header p { color: var(--text-muted); font-size: 14px; }

        /* ─── FORM ─── */
        .form-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 28px;
            margin-bottom: 32px;
            box-shadow: var(--shadow-sm);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .field label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .field select, .field input[type="number"] {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: var(--font-sans);
            color: var(--text-primary);
            background: #fff;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .field select:focus, .field input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67,56,202,0.08);
        }
        .field select:disabled { opacity: 0.5; cursor: not-allowed; }
        .field select option { background: #fff; }
        .field .hint { font-size: 11px; color: var(--text-light); margin-top: 4px; }

        .submit-btn {
            width: 100%;
            padding: 10px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            font-family: var(--font-sans);
            cursor: pointer;
            transition: background 0.15s;
        }
        .submit-btn:hover { background: var(--primary-hover); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ─── RESULTS ─── */
        .results-count {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: var(--success-light);
            border: 1px solid rgba(5,150,105,0.15);
            border-radius: var(--radius-sm);
            margin-bottom: 24px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .results-count strong { color: var(--success); font-family: var(--font-mono); }

        /* ─── COURSE CARD ─── */
        .course-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: var(--shadow-xs);
            transition: box-shadow 0.2s, border-color 0.2s;
        }
        .course-card:hover {
            border-color: var(--border-hover);
            box-shadow: var(--shadow-md);
        }

        .card-body { padding: 24px; }
        .card-top { display: flex; justify-content: space-between; align-items: start; gap: 12px; margin-bottom: 16px; }
        .card-top h3 { font-size: 17px; font-weight: 700; color: var(--text-primary); line-height: 1.35; }

        .priority-tag {
            font-size: 11px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 100px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .priority-high   { background: var(--success-light); color: var(--success); }
        .priority-medium  { background: var(--warning-light); color: var(--warning); }
        .priority-low     { background: var(--danger-light); color: var(--danger); }

        .meta-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
        .meta-chip {
            font-size: 12px;
            padding: 4px 10px;
            background: var(--bg-subtle);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }
        .meta-chip b { color: var(--text-primary); font-weight: 600; }

        .description {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.7;
            margin-bottom: 20px;
            padding-left: 12px;
            border-left: 2px solid var(--border);
        }

        .careers-heading {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 10px;
        }

        .career-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 8px;
        }
        .career-item {
            padding: 10px 12px;
            background: var(--bg-subtle);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            transition: background 0.15s;
            cursor: pointer;
        }
        .career-item:hover { background: var(--primary-light); border-color: var(--primary-border); }
        .career-item .name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
        .career-item .role { font-size: 11px; color: var(--text-light); font-family: var(--font-mono); }

        .card-footer {
            padding: 14px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
            background: var(--bg-subtle);
        }
        .card-footer .btn {
            padding: 7px 14px;
            font-size: 12px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            font-family: var(--font-sans);
            border: 1px solid;
            transition: all 0.15s;
        }
        .btn-yt   { background: #fff; border-color: var(--border); color: var(--text-secondary); }
        .btn-yt:hover { background: var(--bg-hover); }
        .btn-detail { background: var(--primary-light); border-color: var(--primary-border); color: var(--primary); }
        .btn-detail:hover { background: rgba(67,56,202,0.1); }
        .btn-save  { background: var(--success-light); border-color: rgba(5,150,105,0.2); color: var(--success); }
        .btn-save:hover { background: rgba(5,150,105,0.1); }

        /* ─── States ─── */
        .empty-state { text-align: center; padding: 60px 24px; color: var(--text-light); }
        .empty-state .icon { font-size: 48px; margin-bottom: 14px; }
        .loading { text-align: center; padding: 60px; color: var(--text-light); font-size: 14px; }
        .msg { padding: 12px 16px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 16px; }
        .msg-err { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; }
        .msg-ok  { background: #f0fdf4; border: 1px solid #bbf7d0; color: #059669; }

        /* ─── Modal ─── */
        .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.3); z-index:1000; }
        .modal { background:#fff; border-radius:var(--radius-lg); padding:28px; width:92%; max-width:460px; margin:12% auto; box-shadow:var(--shadow-md); }
        .modal h2 { font-size:18px; margin-bottom:14px; }
        .modal p { color:var(--text-muted); font-size:13px; line-height:1.7; margin-bottom:8px; }
        .modal .lbl { font-size:11px; font-weight:600; text-transform:uppercase; color:var(--text-light); margin-top:14px; margin-bottom:4px; }
        .modal-close { float:right; background:none; border:none; font-size:20px; color:var(--text-light); cursor:pointer; }
        .modal-close:hover { color:var(--text-primary); }

        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; }
            .career-list { grid-template-columns: 1fr; }
            .card-footer { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div id="navbar-container"></div>

    <div class="container">
        <div class="page-header">
            <h1>Course Recommendations</h1>
            <p>Enter your stream, percentage, and interest area to find the best courses for you</p>
        </div>

        <div class="form-card">
            <form id="recommendationForm">
                <div class="form-row">
                    <div class="field">
                        <label for="stream">Stream</label>
                        <select id="stream" required>
                            <option value="">Select your stream</option>
                            <option value="PCM">PCM (Maths)</option>
                            <option value="PCB">PCB (Biology)</option>
                            <option value="Commerce">Commerce</option>
                            <option value="Humanities">Humanities</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="percentage">12th Percentage</label>
                        <input type="number" id="percentage" min="33" max="100" value="60" required>
                        <div class="hint">Minimum 40%</div>
                    </div>
                    <div class="field">
                        <label for="interest">Interest Area</label>
                        <select id="interest" disabled>
                            <option value="">Select stream first</option>
                        </select>
                        <div class="hint">Filtered by stream</div>
                    </div>
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">Get Recommendations</button>
            </form>
        </div>

        <div id="resultsSection"></div>
    </div>

    <!-- Modal -->
    <div id="courseModal" class="overlay">
        <div class="modal">
            <button class="modal-close" onclick="closeCourseModal()">&times;</button>
            <h2 id="courseTitle">Loading…</h2>
            <div><span class="lbl">Job Role</span><p id="courseChannel">—</p></div>
            <div><span class="lbl">What You'll Do</span><p id="courseDescription">—</p></div>
            <div><span class="lbl">Key Skills Required</span><p id="courseSkills">—</p></div>
            <div><span class="lbl">Career Growth</span><p id="courseGrowth">—</p></div>
            <div style="margin-top:20px;">
                <button class="submit-btn" onclick="watchOnYoutube()" style="width:100%">Learn More on YouTube</button>
            </div>
        </div>
    </div>

    <script>
        /* ═══ AUTH ═══ */
        if (!(localStorage.getItem('userId') || sessionStorage.getItem('userId'))) window.location.href = 'login.html';

        /* ═══ INTEREST MAP ═══ */
        const interestMap = {
            PCM: [
                { value: 'engineering', label: 'Engineering (B.Tech) & Architecture' },
                { value: 'data', label: 'AI & Data Science' },
                { value: 'computing', label: 'Computing — BCA & B.Sc CS' },
                { value: 'design', label: 'Design — UI/UX, Fashion, Interior' },
                { value: 'hotel', label: 'Hotel Management' }
            ],
            PCB: [
                { value: 'medical', label: 'Medical — MBBS & Dental' },
                { value: 'nursing', label: 'Nursing' },
                { value: 'pharmacy', label: 'Pharmacy (B.Pharm)' },
                { value: 'biotech', label: 'Life Sciences — Biotech / Micro / Genetics' },
                { value: 'design', label: 'Design — UI/UX, Fashion, Interior' },
                { value: 'hotel', label: 'Hotel Management' }
            ],
            Commerce: [
                { value: 'accounting', label: 'Accounting, CA & B.Com' },
                { value: 'business', label: 'BBA — Business Management' },
                { value: 'economics', label: 'Economics (Hons)' },
                { value: 'marketing', label: 'Digital Marketing & Analytics' },
                { value: 'design', label: 'Design — UI/UX, Fashion, Interior' },
                { value: 'hotel', label: 'Hotel Management' }
            ],
            Humanities: [
                { value: 'psychology', label: 'Psychology' },
                { value: 'journalism', label: 'Journalism (BJMC) & English' },
                { value: 'law', label: 'Law — BA LLB / BBA LLB' },
                { value: 'design', label: 'Design — UI/UX, Fashion, Interior' },
                { value: 'hotel', label: 'Hotel Management' }
            ]
        };

        document.getElementById('stream').addEventListener('change', function() {
            const sel = this.value;
            const el = document.getElementById('interest');
            if (!sel) { el.disabled = true; el.innerHTML = '<option value="">Select stream first</option>'; return; }
            el.disabled = false;
            const opts = interestMap[sel] || [];
            el.innerHTML = '<option value="">All (no filter)</option>' + opts.map(o => `<option value="${o.value}">${o.label}</option>`).join('');
        });

        function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
        function ytLink(name) { return 'https://www.youtube.com/results?search_query=' + encodeURIComponent(name + ' course career scope India'); }

        /* ═══ SUBMIT ═══ */
        let busy = false;
        document.getElementById('recommendationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (busy) return;
            const stream = document.getElementById('stream').value;
            const percentage = parseInt(document.getElementById('percentage').value);
            const interest = document.getElementById('interest').value;
            if (!stream) return;

            busy = true;
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.textContent = 'Searching…';
            document.getElementById('resultsSection').innerHTML = '<div class="loading">Searching courses…</div>';

            try {
                const res = await fetch('/api/recommend-courses', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ stream, percentage, interest_areas: interest || '' })
                });
                if (!res.ok) throw new Error('Server error: ' + res.status);
                const data = await res.json();
                if (data.success) render(data, stream, percentage);
                else showMsg(data.message || 'No results found', 'err');
            } catch (err) { showMsg('Failed — ' + err.message, 'err'); }
            finally { busy = false; btn.disabled = false; btn.textContent = 'Get Recommendations'; }
        });

        function showMsg(m, t) { document.getElementById('resultsSection').innerHTML = `<div class="msg msg-${t}">${esc(m)}</div>`; }

        /* ═══ RENDER ═══ */
        function render(data, stream, pct) {
            const sec = document.getElementById('resultsSection');
            if (!data.courses || !data.courses.length) { sec.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>No courses found. Try a different stream or percentage.</p></div>'; return; }

            const seen = new Set();
            const courses = data.courses.filter(c => { if (seen.has(c.name)) return false; seen.add(c.name); return true; });
            const seenCareers = new Set();
            const profile = data.student_profile || { stream, percentage: pct };

            let html = `<div class="results-count"><strong>${courses.length}</strong> courses for ${esc(profile.stream)} at <strong>${profile.percentage}%</strong></div>`;

            courses.forEach(c => {
                const p = (c.priority || 'Medium').toLowerCase();
                const uCareers = (c.careers || []).filter(cr => { const k = cr.career_name + cr.job_role; if (seenCareers.has(k)) return false; seenCareers.add(k); return true; });
                const enc = encodeURIComponent(c.name);

                html += `<div class="course-card">
                    <div class="card-body">
                        <div class="card-top">
                            <h3>${esc(c.name)}</h3>
                            <span class="priority-tag priority-${p}">${c.priority || 'Medium'}</span>
                        </div>
                        <div class="meta-row">
                            <span class="meta-chip"><b>${esc(c.stream)}</b></span>
                            <span class="meta-chip">Min <b>${c.min_percentage || 33}%</b></span>
                            ${c.duration_months ? `<span class="meta-chip"><b>${c.duration_months}</b> months</span>` : ''}
                        </div>
                        <div class="description">${esc(c.description)}</div>
                        ${uCareers.length ? `<div class="careers-heading">Career Paths</div>
                        <div class="career-list">${uCareers.map(cr => `<div class="career-item" data-career="${encodeURIComponent(cr.career_name)}" data-role="${encodeURIComponent(cr.job_role)}" data-course="${enc}"><div class="name">${esc(cr.career_name)}</div><div class="role">${esc(cr.job_role)}</div></div>`).join('')}</div>` : ''}
                    </div>
                    <div class="card-footer">
                        <button class="btn btn-yt" data-yt="${enc}">YouTube</button>
                        <button class="btn btn-detail" data-details="${c.id}">Details</button>
                        <button class="btn btn-save" data-bookmark="${c.id}">Save</button>
                    </div>
                </div>`;
            });

            sec.innerHTML = html;
            sec.addEventListener('click', handleClick);
        }

        function handleClick(e) {
            const chip = e.target.closest('.career-item');
            if (chip) { showCareerInfo(decodeURIComponent(chip.dataset.career), decodeURIComponent(chip.dataset.role), decodeURIComponent(chip.dataset.course)); return; }
            const yt = e.target.closest('[data-yt]');
            if (yt) { window.open(ytLink(decodeURIComponent(yt.dataset.yt)), '_blank'); return; }
            const det = e.target.closest('[data-details]');
            if (det) { window.location.href = 'course-details.html?id=' + det.dataset.details; return; }
            const bm = e.target.closest('[data-bookmark]');
            if (bm && !bm.disabled) { bookmark(parseInt(bm.dataset.bookmark), bm); return; }
        }

        async function bookmark(courseId, btn) {
            const uid = localStorage.getItem('userId') || sessionStorage.getItem('userId');
            if (!uid) return;
            try {
                const res = await (window.authFetch || fetch)('/api/bookmarks', { method: 'POST', headers: {'Content-Type':'application/json'}, credentials: 'include', body: JSON.stringify({ userId: uid, courseId }) });
                const data = await res.json();
                btn.textContent = data.success ? '✓ Saved' : 'Failed';
                if (data.success) { btn.disabled = true; btn.style.background = '#f0fdf4'; btn.style.color = '#059669'; }
                else setTimeout(() => { btn.textContent = 'Save'; }, 2000);
            } catch { btn.textContent = 'Error'; setTimeout(() => { btn.textContent = 'Save'; }, 2000); }
        }

        const careerDetails = {
            'Software Engineer': { desc: 'Design, develop, and maintain software applications. Work across front-end, back-end, and full-stack development using modern frameworks and tools.', skills: 'JavaScript, Python, Data Structures, System Design, Git, Agile', growth: 'Junior Developer → Mid-Level Engineer → Senior Engineer → Tech Lead → CTO' },
            'Data Scientist': { desc: 'Analyse complex datasets to extract insights and build predictive models. Apply machine learning and statistical methods to solve business problems.', skills: 'Python, R, SQL, Machine Learning, Statistics, Data Visualization', growth: 'Data Analyst → Data Scientist → Senior Data Scientist → Lead DS → Chief Data Officer' },
            'DevOps Engineer': { desc: 'Bridge development and operations by automating CI/CD pipelines, managing cloud infrastructure, and ensuring system reliability.', skills: 'Docker, Kubernetes, AWS/Azure, Jenkins, Terraform, Linux', growth: 'DevOps Engineer → Senior DevOps → Site Reliability Engineer → Cloud Architect' },
            'Cybersecurity Analyst': { desc: 'Protect organisations from cyber threats. Monitor security systems, conduct vulnerability assessments, and respond to security incidents.', skills: 'Network Security, Ethical Hacking, SIEM, Cryptography, Compliance', growth: 'SOC Analyst → Security Engineer → Senior Analyst → CISO' },
            'AI/ML Engineer': { desc: 'Build and deploy artificial intelligence and machine learning models for real-world applications like NLP, computer vision, and recommendation systems.', skills: 'TensorFlow, PyTorch, Deep Learning, NLP, Computer Vision, MLOps', growth: 'ML Engineer → Senior ML Engineer → AI Architect → Head of AI' },
            'Mechanical Engineer': { desc: 'Design and analyse mechanical systems, from automotive components to industrial machinery, using CAD tools and engineering principles.', skills: 'AutoCAD, SolidWorks, Thermodynamics, Manufacturing, FEA', growth: 'Junior Engineer → Design Engineer → Project Manager → Engineering Director' },
            'Civil Engineer': { desc: 'Plan, design, and oversee construction of infrastructure projects including buildings, roads, bridges, and water systems.', skills: 'Structural Analysis, AutoCAD, Project Management, Surveying', growth: 'Site Engineer → Project Engineer → Project Manager → Chief Engineer' },
            'Doctor': { desc: 'Diagnose and treat illnesses, prescribe medications, and provide preventive care. Work in hospitals, clinics, or private practice.', skills: 'Clinical Diagnosis, Patient Care, Medical Procedures, Communication', growth: 'Intern → Resident → Specialist → Senior Consultant → Department Head' },
            'Chartered Accountant': { desc: 'Handle financial reporting, auditing, taxation, and business advisory services for companies and individuals.', skills: 'Accounting Standards, Tax Law, Auditing, Financial Analysis, Excel', growth: 'Article Trainee → CA → Senior CA → Partner → CFO' },
            'Lawyer': { desc: 'Provide legal counsel, represent clients in court, draft legal documents, and ensure regulatory compliance.', skills: 'Legal Research, Argumentation, Contract Drafting, Negotiation', growth: 'Associate → Senior Associate → Partner → Senior Partner / Judge' },
            'Pharmacist': { desc: 'Dispense medications, counsel patients on drug usage, and ensure safe pharmaceutical practices in clinical or retail settings.', skills: 'Pharmacology, Drug Interactions, Patient Counselling, Compounding', growth: 'Pharmacist → Clinical Pharmacist → Pharmacy Manager → Director' },
            'Journalist': { desc: 'Research, investigate, and report news stories across print, digital, and broadcast media platforms.', skills: 'Writing, Investigative Research, Interviewing, Media Ethics, Digital Tools', growth: 'Reporter → Senior Reporter → Editor → Bureau Chief → Editor-in-Chief' },
            'Psychologist': { desc: 'Study human behaviour and mental processes. Provide therapy, conduct assessments, and help individuals improve their mental well-being.', skills: 'Counselling, CBT, Psychometrics, Research Methods, Empathy', growth: 'Counsellor → Clinical Psychologist → Senior Psychologist → Private Practice' },
            'UI/UX Designer': { desc: 'Create intuitive and visually appealing digital interfaces. Conduct user research, build wireframes, and design interactive prototypes.', skills: 'Figma, User Research, Wireframing, Prototyping, Design Thinking', growth: 'Junior Designer → UX Designer → Senior Designer → Design Lead → VP Design' },
            'Hotel Manager': { desc: 'Oversee daily hotel operations, manage staff, ensure guest satisfaction, and drive revenue growth across departments.', skills: 'Hospitality Management, Customer Service, Leadership, Budgeting', growth: 'Front Desk → Asst. Manager → Hotel Manager → General Manager → VP Operations' },
        };

        let currentCourse = '';
        function showCareerInfo(careerName, jobRole, courseName) {
            currentCourse = careerName;
            const info = careerDetails[careerName] || { desc: `As a ${careerName}, you will work in the field of ${jobRole}. This career path offers strong growth opportunities and is in demand across industries.`, skills: 'Analytical Thinking, Communication, Problem Solving, Domain Expertise, Teamwork', growth: 'Entry Level → Mid Level → Senior Level → Lead / Manager → Director' };
            document.getElementById('courseTitle').textContent = careerName;
            document.getElementById('courseChannel').textContent = jobRole;
            document.getElementById('courseDescription').textContent = info.desc;
            document.getElementById('courseSkills').textContent = info.skills;
            document.getElementById('courseGrowth').textContent = info.growth;
            document.getElementById('courseModal').style.display = 'block';
        }
        function closeCourseModal() { document.getElementById('courseModal').style.display = 'none'; }
        function watchOnYoutube() { if (currentCourse) window.open(ytLink(currentCourse + ' career path scope India'), '_blank'); }
        window.addEventListener('click', e => { if (e.target === document.getElementById('courseModal')) closeCourseModal(); });

        async function logout() {
            try { await fetch('/logout'); } catch(e){}
            localStorage.clear(); sessionStorage.clear(); window.location.href = 'login.html';
        }
    </script>
    <script src="nav.js"></script>
</body>
</html>
