<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Career Course Compass</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',-apple-system,sans-serif}
        body{min-height:100vh;background:#0a0e1a;color:#f1f5f9}
        body::before{content:'';position:fixed;width:500px;height:500px;background:rgba(239,68,68,0.08);border-radius:50%;filter:blur(100px);top:-150px;right:-100px;pointer-events:none}
        .nav{position:sticky;top:0;z-index:100;background:rgba(10,14,26,0.85);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.06);padding:0 32px}
        .nav-inner{max-width:1300px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px}
        .nav-logo{font-size:18px;font-weight:700;background:linear-gradient(135deg,#ef4444,#f97316);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
        .nav-right{display:flex;gap:12px}
        .nav-right a,.nav-right button{color:#94a3b8;text-decoration:none;font-size:13px;font-weight:500;padding:8px 14px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);cursor:pointer;transition:all 0.2s}
        .nav-right a:hover,.nav-right button:hover{color:#f1f5f9;background:rgba(99,102,241,0.15)}
        .container{max-width:1300px;margin:0 auto;padding:32px;position:relative;z-index:1}
        .page-header{margin-bottom:24px}.page-header h1{font-size:28px;font-weight:700;margin-bottom:6px}
        .page-header h1 span{background:linear-gradient(135deg,#ef4444,#f97316);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
        .page-header p{color:#64748b;font-size:14px}
        /* Stats Grid */
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:28px}
        .stat-card{background:rgba(17,24,39,0.6);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:18px;transition:all 0.3s}
        .stat-card:hover{border-color:rgba(239,68,68,0.3);transform:translateY(-2px)}
        .stat-icon{font-size:24px;margin-bottom:8px}
        .stat-value{font-size:28px;font-weight:800;color:#f1f5f9}
        .stat-label{font-size:11px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-top:2px}
        /* Tables & Panels */
        .two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
        .panel{background:rgba(17,24,39,0.6);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:20px}
        .panel h3{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
        /* Stream Distribution */
        .stream-bar{display:flex;gap:8px;align-items:center;margin-bottom:8px}
        .stream-name{font-size:12px;color:#94a3b8;width:100px}
        .stream-bar-bg{flex:1;height:24px;background:rgba(255,255,255,0.04);border-radius:6px;overflow:hidden;position:relative}
        .stream-bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:11px;font-weight:600;color:white;transition:width 1s ease}
        .stream-bar-fill.Science{background:linear-gradient(90deg,#3b82f6,#60a5fa)}
        .stream-bar-fill.Commerce{background:linear-gradient(90deg,#10b981,#34d399)}
        .stream-bar-fill.Humanities{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
        /* Popular Courses */
        .pop-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:13px}
        .pop-item:last-child{border-bottom:none}
        .pop-name{color:#e2e8f0;font-weight:500}
        .pop-count{color:#818cf8;font-weight:700}
        /* Users Table */
        .users-section{margin-top:24px}
        table{width:100%;border-collapse:collapse;background:rgba(17,24,39,0.6);border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,0.06)}
        th{padding:12px 14px;text-align:left;font-size:11px;font-weight:600;color:#a5b4fc;text-transform:uppercase;letter-spacing:0.05em;background:rgba(99,102,241,0.08);border-bottom:1px solid rgba(255,255,255,0.06)}
        td{padding:10px 14px;font-size:13px;color:#94a3b8;border-bottom:1px solid rgba(255,255,255,0.04)}
        tr:hover td{background:rgba(255,255,255,0.02)}
        .tab-btns{display:flex;gap:8px;margin-bottom:16px}
        .tab-btn{background:rgba(17,24,39,0.6);border:1px solid rgba(255,255,255,0.08);color:#94a3b8;font-size:13px;padding:8px 18px;border-radius:8px;cursor:pointer;transition:all 0.2s}
        .tab-btn:hover,.tab-btn.active{background:rgba(239,68,68,0.15);color:#f87171;border-color:rgba(239,68,68,0.3)}
        @media(max-width:768px){.two-col{grid-template-columns:1fr}.container{padding:16px}}
    </style>
    <script>
        // Client-side quick check (UX — redirects fast)
        if (!localStorage.getItem('userId')) { window.location.href = 'login.html'; }
        else if (localStorage.getItem('isAdmin') !== '1') { alert('Access denied. Admin privileges required.'); window.location.href = 'dashboard.html'; }

        // Server-side verified check (security — prevents localStorage tampering)
        (async function checkAdminAccess() {
            try {
                document.body.style.visibility = 'hidden';
                const res = await fetch('/api/auth-status', { credentials: 'include' });
                const data = await res.json();
                if (!data.authenticated) {
                    window.location.replace('/login.html');
                    return;
                }
                if (!data.user?.is_admin) {
                    window.location.replace('/dashboard.html');
                    return;
                }
                document.body.style.visibility = 'visible';
            } catch (err) {
                window.location.replace('/login.html');
            }
        })();
    </script>
</head>
<body>
    <div id="navbar-container"></div>
    <div class="container">
        <div class="page-header">
            <h1>⚙️ <span>Admin Dashboard</span></h1>
            <p>Platform analytics, user management, and course overview</p>
        </div>
        <div class="stats-grid" id="statsGrid"></div>
        <div class="two-col">
            <div class="panel"><h3>📊 Courses by Stream</h3><div id="streamChart"></div></div>
            <div class="panel"><h3>🔥 Most Popular Courses</h3><div id="popularCourses"></div></div>
        </div>
        <div class="users-section">
            <div class="tab-btns">
                <button class="tab-btn active" onclick="showTab('users',this)">👥 All Users</button>
                <button class="tab-btn" onclick="showTab('courses',this)">📚 All Courses</button>
            </div>
            <div id="tabContent"></div>
        </div>
    </div>
    <script>
        async function loadAdmin(){
            const fetchOpts = { credentials: 'include' };
            const [statsRes,usersRes,coursesRes]=await Promise.all([
                fetch('/api/admin/stats', fetchOpts).then(r=>r.json()),
                fetch('/api/admin/users', fetchOpts).then(r=>r.json()),
                fetch('/api/all-courses', fetchOpts).then(r=>r.json())
            ]);
            if(statsRes.success){
                const s=statsRes.stats;
                document.getElementById('statsGrid').innerHTML=[
                    {icon:'👥',val:s.totalUsers,label:'Total Users'},
                    {icon:'📚',val:s.totalCourses,label:'Total Courses'},
                    {icon:'🔖',val:s.totalBookmarks,label:'Total Bookmarks'},
                    {icon:'⭐',val:s.totalRatings,label:'Total Ratings'},
                    {icon:'✅',val:s.completedCourses,label:'Completions'},
                    {icon:'🏅',val:s.totalBadges,label:'Badges Awarded'}
                ].map(c=>`<div class="stat-card"><div class="stat-icon">${c.icon}</div><div class="stat-value">${c.val}</div><div class="stat-label">${c.label}</div></div>`).join('');
                // Stream chart
                const maxStream=Math.max(...s.coursesByStream.map(x=>x.count));
                document.getElementById('streamChart').innerHTML=s.coursesByStream.map(x=>`
                    <div class="stream-bar"><span class="stream-name">${x.stream}</span>
                    <div class="stream-bar-bg"><div class="stream-bar-fill ${x.stream}" style="width:${(x.count/maxStream)*100}%">${x.count}</div></div></div>`).join('');
                // Popular
                document.getElementById('popularCourses').innerHTML=s.popularCourses.map(p=>`
                    <div class="pop-item"><span class="pop-name">${p.name}</span><span class="pop-count">${p.bookmarks} saves</span></div>`).join('')||'<p style="color:#475569;font-size:13px">No bookmarks yet</p>';
            }
            window._users=usersRes.success?usersRes.users:[];
            window._courses=coursesRes.success?coursesRes.courses:[];
            showTab('users',document.querySelector('.tab-btn'));
        }
        function showTab(tab,el){
            document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
            el.classList.add('active');
            if(tab==='users'){
                document.getElementById('tabContent').innerHTML=`<table><thead><tr><th>ID</th><th>Email</th><th>Name</th><th>Bookmarks</th><th>Completed</th><th>Badges</th><th>Streak</th><th>Joined</th></tr></thead><tbody>${
                    window._users.map(u=>`<tr><td>${u.id}</td><td style="color:#e2e8f0">${u.email}</td><td>${u.name||'—'}</td><td>${u.bookmarks}</td><td>${u.completed}</td><td>${u.badges}</td><td>${u.streak||0}d</td><td>${u.created_at?new Date(u.created_at).toLocaleDateString():''}</td></tr>`).join('')
                }</tbody></table>`;
            } else {
                document.getElementById('tabContent').innerHTML=`<table><thead><tr><th>ID</th><th>Course Name</th><th>Stream</th><th>Duration</th></tr></thead><tbody>${
                    window._courses.map(c=>`<tr><td>${c.id}</td><td style="color:#e2e8f0">${c.name}</td><td>${c.stream}</td><td>${c.duration_months?c.duration_months+'m':'—'}</td></tr>`).join('')
                }</tbody></table>`;
            }
        }
        async function logout() {
            try { await fetch('/logout'); } catch(e){}
            localStorage.clear();
            sessionStorage.clear();
            window.location.href = 'login.html';
        }
        loadAdmin();
    </script>
    <script src="nav.js"></script>
</body>
</html>
