<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrance Exams | Career Course Compass</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',-apple-system,sans-serif}
        body{min-height:100vh;background:#0a0e1a;color:#f1f5f9}
        body::before{content:'';position:fixed;width:500px;height:500px;background:rgba(99,102,241,0.12);border-radius:50%;filter:blur(100px);top:-150px;right:-100px;pointer-events:none}
        .nav{position:sticky;top:0;z-index:100;background:rgba(10,14,26,0.85);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.06);padding:0 32px}
        .nav-inner{max-width:1300px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px}
        .nav-logo{font-size:18px;font-weight:700;background:linear-gradient(135deg,#818cf8,#a78bfa);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
        .nav-links{display:flex;gap:6px;flex-wrap:wrap}
        .nav-links a{color:#94a3b8;text-decoration:none;font-size:13px;font-weight:500;padding:8px 14px;border-radius:8px;transition:all 0.2s}
        .nav-links a:hover,.nav-links a.active{color:#f1f5f9;background:rgba(99,102,241,0.15)}
        .nav-links a.active{color:#a5b4fc}
        .container{max-width:1300px;margin:0 auto;padding:32px;position:relative;z-index:1}
        .page-header{margin-bottom:20px}.page-header h1{font-size:28px;font-weight:700;margin-bottom:6px}
        .page-header h1 span{background:linear-gradient(135deg,#818cf8,#c084fc);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
        .page-header p{color:#64748b;font-size:14px}
        .filter-row{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap}
        .filter-btn{background:rgba(17,24,39,0.6);border:1px solid rgba(255,255,255,0.08);color:#94a3b8;font-size:13px;padding:8px 18px;border-radius:20px;cursor:pointer;transition:all 0.2s}
        .filter-btn:hover,.filter-btn.active{background:rgba(99,102,241,0.15);color:#a5b4fc;border-color:rgba(99,102,241,0.3)}
        .exam-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:16px}
        .exam-card{background:rgba(17,24,39,0.6);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:22px;transition:all 0.3s}
        .exam-card:hover{border-color:rgba(99,102,241,0.3);transform:translateY(-2px)}
        .exam-card h3{font-size:16px;font-weight:700;color:#f1f5f9;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
        .type-badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;background:rgba(99,102,241,0.15);color:#a5b4fc}
        .exam-card p{font-size:13px;color:#94a3b8;line-height:1.5;margin-bottom:12px}
        .exam-meta{display:flex;flex-direction:column;gap:6px}
        .exam-meta-item{font-size:12px;color:#64748b;display:flex;align-items:center;gap:6px}
        .exam-meta-item strong{color:#94a3b8}
        .visit-btn{display:inline-block;margin-top:12px;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.2);color:#a5b4fc;font-size:12px;padding:8px 16px;border-radius:8px;cursor:pointer;text-decoration:none;font-weight:500;transition:all 0.2s}
        .visit-btn:hover{background:rgba(99,102,241,0.25)}
        .count-badge{font-size:13px;color:#a5b4fc;font-weight:600}
        @media(max-width:768px){.container{padding:16px}.exam-grid{grid-template-columns:1fr}.nav-links{display:none}}
    </style>
<link rel="icon" type="image/svg+xml" href="logo.svg">
</head>
<body>
    <div id="navbar-container"></div>
    <div class="container">
        <div class="page-header">
            <h1>📝 <span>Entrance Exams</span></h1>
            <p>Major competitive exams with eligibility, dates, and direct links</p>
        </div>
        <div class="filter-row">
            <button class="filter-btn active" onclick="loadExams('',this)">All <span class="count-badge" id="countAll"></span></button>
            <button class="filter-btn" onclick="loadExams('Science',this)">🔬 Science</button>
            <button class="filter-btn" onclick="loadExams('Commerce',this)">💼 Commerce</button>
            <button class="filter-btn" onclick="loadExams('Humanities',this)">📖 Humanities</button>
        </div>
        <div class="exam-grid" id="examGrid"></div>
    </div>
    <script>
        if (!(localStorage.getItem('userId')||sessionStorage.getItem('userId'))) window.location.href='login.html';
        async function loadExams(stream, el) {
            document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
            if (el) el.classList.add('active'); else document.querySelector('.filter-btn').classList.add('active');
            const url = stream ? `/api/exams?stream=${stream}` : '/api/exams';
            const res = await fetch(url).then(r=>r.json());
            if (res.success) {
                document.getElementById('countAll').textContent = res.total;
                document.getElementById('examGrid').innerHTML = res.exams.map(e=>`
                    <div class="exam-card">
                        <h3>${e.name} <span class="type-badge">${e.type}</span></h3>
                        <p>${e.description}</p>
                        <div class="exam-meta">
                            <div class="exam-meta-item">📅 <strong>When:</strong> ${e.month}</div>
                            <div class="exam-meta-item">🎯 <strong>Eligibility:</strong> ${e.eligibility}</div>
                            <div class="exam-meta-item">📚 <strong>Stream:</strong> ${e.stream}</div>
                        </div>
                        <a href="${e.website}" target="_blank" class="visit-btn">🌐 Official Website →</a>
                    </div>`).join('');
            }
        }
        async function logout() {
            try { await fetch('/logout'); } catch(e){}
            localStorage.clear();
            sessionStorage.clear();
            window.location.href = 'login.html';
        }
        loadExams('');
    </script>
    <script src="nav.js"></script>
</body>
</html>
