<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Career Course Compass</title>
    <link rel="icon" href="/favicon.ico">
    <meta name="theme-color" content="#6c63ff">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',-apple-system,sans-serif}
        body{min-height:100vh;background:#0a0e1a;color:#f1f5f9;display:flex;align-items:center;justify-content:center;overflow:hidden}
        body::before{content:'';position:fixed;width:600px;height:600px;background:rgba(99,102,241,0.1);border-radius:50%;filter:blur(120px);top:-200px;right:-100px;pointer-events:none}
        body::after{content:'';position:fixed;width:400px;height:400px;background:rgba(168,85,247,0.08);border-radius:50%;filter:blur(100px);bottom:-100px;left:-100px;pointer-events:none}
        .container{text-align:center;position:relative;z-index:1;padding:32px}
        .astronaut{font-size:120px;animation:float 4s ease-in-out infinite;display:inline-block}
        @keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-20px) rotate(5deg)}50%{transform:translateY(-10px) rotate(-3deg)}75%{transform:translateY(-25px) rotate(2deg)}}
        .stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
        .star{position:absolute;width:2px;height:2px;background:white;border-radius:50%;animation:twinkle 3s ease-in-out infinite}
        @keyframes twinkle{0%,100%{opacity:0.2}50%{opacity:1}}
        .code{font-size:140px;font-weight:800;background:linear-gradient(135deg,#818cf8,#c084fc,#f472b6);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;line-height:1;margin-bottom:8px}
        .title{font-size:24px;font-weight:700;color:#e2e8f0;margin-bottom:8px}
        .subtitle{font-size:14px;color:#64748b;margin-bottom:32px;max-width:400px;margin-left:auto;margin-right:auto}
        .btn{display:inline-block;background:linear-gradient(135deg,#6366f1,#a855f7);color:white;text-decoration:none;padding:14px 32px;border-radius:12px;font-size:14px;font-weight:600;transition:all 0.3s;border:none;cursor:pointer}
        .btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(99,102,241,0.35)}
        .links{margin-top:20px;display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
        .links a{color:#818cf8;text-decoration:none;font-size:13px;font-weight:500;transition:color 0.2s}
        .links a:hover{color:#a5b4fc}
    </style>
<link rel="icon" type="image/svg+xml" href="logo.svg">
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="container">
        <div class="astronaut">🧑‍🚀</div>
        <div class="code">404</div>
        <div class="title">Lost in Space</div>
        <div class="subtitle">The page you're looking for drifted off into the cosmos. Let's get you back on track.</div>
        <a href="/dashboard.html" class="btn">🏠 Go Back Home</a>
        <div class="links">
            <a href="/recommendation.html">Recommendations</a>
            <a href="/all-careers.html">Careers</a>
            <a href="/leaderboard.html">Leaderboard</a>
            <a href="/exams.html">Exams</a>
        </div>
    </div>
    <script>
        const stars=document.getElementById('stars');
        for(let i=0;i<60;i++){
            const s=document.createElement('div');
            s.className='star';
            s.style.left=Math.random()*100+'%';
            s.style.top=Math.random()*100+'%';
            s.style.animationDelay=Math.random()*3+'s';
            s.style.width=s.style.height=Math.random()*3+1+'px';
            stars.appendChild(s);
        }
    </script>
</body>
</html>
