<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Details | Career Course Compass</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Detailed course information with career paths and learning resources.">
    <link rel="stylesheet" href="design-system.css">
    <style>
        :root {
            --bg-card: #fffdf9;
            --bg-glass: rgba(245,242,237,0.8);
            --border-glass: #e8e4dd;
            --accent-primary: #4338ca;
            --accent-secondary: #6366f1;
            --accent-gradient: linear-gradient(135deg,#4338ca,#6366f1);
            --text-primary: #111827;
            --text-secondary: #374151;
            --text-muted: #6b7280;
        }
        *{margin:0;padding:0;box-sizing:border-box}

        body{
            font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
            background:var(--bg-page);
            min-height:100vh;
            color:var(--text-primary);
            overflow-x:hidden;
        }

        .container{max-width:960px;margin:0 auto;padding:18px;position:relative;z-index:1}

        .top-bar{
            display:flex;justify-content:space-between;align-items:center;
            padding:13px 22px;background:var(--bg-glass);
            border:1px solid var(--border-glass);border-radius:14px;
            margin-bottom:28px;
        }
        .top-bar h1{
            font-size:1.1rem;font-weight:700;
            background:var(--accent-gradient);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
        }

        .btn{
            padding:9px 17px;border:none;border-radius:9px;
            font-size:13px;font-weight:600;cursor:pointer;
            transition:all 0.25s;font-family:inherit;
            display:inline-flex;align-items:center;gap:6px;
        }
        .btn-ghost{background:var(--bg-subtle);border:1px solid var(--border);color:var(--text-secondary)}
        .btn-ghost:hover{background:var(--bg-hover);color:var(--text-primary)}
        .btn-accent{background:var(--accent-gradient);color:#fff}
        .btn-accent:hover{transform:translateY(-2px);box-shadow:0 4px 11px rgba(67,56,202,0.18)}

        .section-card{
            background:var(--bg-card);border:1px solid var(--border);
            border-radius:var(--radius-lg);padding:28px;margin-bottom:18px;
            box-shadow:var(--shadow-sm);
        }
        .section-title{
            font-size:1.1rem;font-weight:700;margin-bottom:14px;
            color:var(--text-primary);
        }
        .course-title{font-size:26px;font-weight:800;margin-bottom:17px;line-height:1.25}

        .meta-grid{
            display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));
            gap:11px;margin-bottom:22px;
        }
        .meta-item{
            padding:14px;background:var(--bg-subtle);
            border:1px solid var(--border);border-radius:11px;
            border-left:3px solid var(--accent-primary);
        }
        .meta-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;font-weight:700;letter-spacing:0.04em;margin-bottom:5px}
        .meta-value{font-size:15px;font-weight:700;color:var(--text-primary)}

        .desc-text{color:var(--text-secondary);line-height:1.75;font-size:0.94rem}
        .desc-text strong{color:var(--text-primary)}

        .skills-grid{
            display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));
            gap:9px;margin-top:11px;
        }
        .skill-tag{
            background:rgba(67,56,202,0.05);color:var(--accent-primary);
            border:1px solid rgba(67,56,202,0.13);
            padding:9px 13px;border-radius:8px;
            text-align:center;font-weight:600;font-size:13px;
        }

        .resource-list{list-style:none;margin-top:11px}
        .resource-list li{
            padding:11px 15px;margin-bottom:7px;
            background:var(--bg-subtle);border:1px solid var(--border);
            border-radius:9px;border-left:3px solid var(--accent-primary);
            font-size:13px;color:var(--text-secondary);
        }
        .resource-list li strong{color:var(--text-primary)}

        .career-grid{
            display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
            gap:14px;margin-top:15px;
        }
        .career-card{
            background:var(--bg-subtle);border:1px solid var(--border);
            border-radius:13px;padding:22px;
            border-left:4px solid var(--accent-secondary);
            transition:all 0.25s;
        }
        .career-card:hover{transform:translateY(-3px);border-color:rgba(67,56,202,0.18);box-shadow:var(--shadow-md)}

        .career-name{font-size:1rem;font-weight:700;color:var(--text-primary);margin-bottom:5px}
        .career-role{
            font-size:13px;color:var(--accent-primary);font-weight:600;margin-bottom:11px;
            display:inline-block;background:rgba(67,56,202,0.05);padding:4px 9px;border-radius:5px;
        }
        .career-desc{font-size:13px;color:var(--text-muted);line-height:1.55;margin-bottom:13px}

        .facts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:11px;margin-top:11px}
        .fact-box{border:1px solid var(--border);padding:17px;border-radius:11px;text-align:center;background:var(--bg-subtle)}
        .fact-value{font-size:21px;font-weight:800;background:var(--accent-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .fact-label{font-size:11px;color:var(--text-muted);margin-top:5px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em}

        .action-footer{text-align:center;padding:35px 18px;margin-bottom:35px}
        .no-data{text-align:center;color:var(--text-muted);padding:22px}

        @media(max-width:768px){
            .career-grid{grid-template-columns:1fr}
            .top-bar{flex-direction:column;gap:11px}
            .course-title{font-size:21px}
            .section-card{padding:17px}
        }
    </style>
    <script>
        if (!localStorage.getItem('userId')) window.location.href = 'login.html';
    </script>
</head>
<body>
    <div id="navbar-container"></div>
    <div class="container">
        <div class="top-bar">
            <h1>Course Details</h1>
            <button class="btn btn-ghost" onclick="goBack()">← Back</button>
        </div>

        <div id="courseDetailsContainer"></div>

        <div class="action-footer">
            <p style="color:var(--text-secondary);margin-bottom:14px;">Want to explore more?</p>
            <button class="btn btn-accent" onclick="document.querySelector('.section-card')?.scrollIntoView({behavior:'smooth'})" style="margin-right:7px;">Back to Top</button>
            <button class="btn btn-ghost" onclick="goBack()">Find More Courses</button>
        </div>
    </div>

    <script>
        const courseId = new URLSearchParams(window.location.search).get('id');

        window.addEventListener('DOMContentLoaded', () => {
            if (!courseId) {
                document.getElementById('courseDetailsContainer').innerHTML = `
                    <div class="section-card"><div class="no-data"><p>No course selected. Go back and select one.</p></div></div>`;
                return;
            }
            loadCourseDetails(courseId);
        });

        function loadCourseDetails(id) {
            document.getElementById('courseDetailsContainer').innerHTML = `
                <div class="section-card" style="text-align:center;padding:55px;">
                    <p style="color:var(--text-secondary);">Loading course details...</p>
                </div>`;

            fetch(`/api/course/${id}`)
                .then(r => { if (!r.ok) throw new Error('Course not found'); return r.json(); })
                .then(data => { if (data.success && data.course) displayCourseDetails(data.course); else throw new Error('Invalid data'); })
                .catch(err => {
                    document.getElementById('courseDetailsContainer').innerHTML = `
                        <div class="section-card" style="text-align:center;padding:60px;">
                            <p style="color:#ef4444;font-size:17px;margin-bottom:11px;">${err.message}</p>
                            <button class="btn btn-accent" onclick="goBack()">Go Back</button>
                        </div>`;
                });
        }

                        <li><strong>Hands-On Practice</strong> - Projects and practical assignments</li>
                        <li><strong>Community</strong> - Study groups, forums and peer collaboration</li>
                        <li><strong>Certifications</strong> - Industry-recognized certifications</li>
                        <li><strong>Mentorship</strong> - Guidance from experienced professionals</li>
                    </ul>
                </div>

                <div class="section-card">
                    <div class="section-title">All Career Opportunities (${course.careers ? course.careers.length : 0})</div>
                    <p style="color:var(--text-muted);margin-bottom:18px;font-size:14px;line-height:1.55;">Career paths you can pursue after completing this course.</p>
                    <div class="career-grid">${careerHTML}</div>
                </div>

                <div class="section-card">
                    <div class="section-title">Quick Facts</div>
                    <div class="facts-grid">
                        <div class="fact-box"><div class="fact-value">${course.stream}</div><div class="fact-label">Stream</div></div>
                        <div class="fact-box"><div class="fact-value">${course.careers ? course.careers.length : 0}</div><div class="fact-label">Career Paths</div></div>
                        ${course.duration_months ? `<div class="fact-box"><div class="fact-value">${course.duration_months}mo</div><div class="fact-label">Duration</div></div>` : ''}
                    </div>
                </div>

                <div class="section-card" id="ratingSection">
                    <div class="section-title">Rate and Review</div>
                    <div style="margin-bottom:16px;">
                        <div id="starRating" style="display:flex;gap:8px;margin-bottom:12px;">
                            ${[1,2,3,4,5].map(s => '<span class="star" data-star="'+s+'" onclick="setRating('+s+')" style="font-size:28px;cursor:pointer;opacity:0.35;transition:all 0.2s;">&#9733;</span>').join('')}
                        </div>
                        <textarea id="reviewText" rows="3" placeholder="Write a review (optional)..." style="width:100%;background:#fff;border:1px solid var(--border);border-radius:9px;padding:11px;color:var(--text-primary);font-family:Inter,sans-serif;font-size:14px;resize:vertical;"></textarea>
                        <button onclick="submitRating(${courseId})" style="margin-top:9px;background:var(--accent-gradient);border:none;color:#fff;padding:9px 22px;border-radius:9px;cursor:pointer;font-weight:600;font-size:14px;">Submit</button>
                    </div>
                    <div id="avgRating" style="margin-bottom:16px;padding:12px 16px;background:var(--bg-subtle);border:1px solid var(--border);border-radius:10px;"></div>
                    <div id="reviewsList"></div>
                </div>

                <div class="section-card" style="display:flex;gap:12px;flex-wrap:wrap;">
                    <button onclick="bookmarkCourse(${courseId})" id="bookmarkBtn" style="flex:1;min-width:180px;background:rgba(67,56,202,0.06);border:1px solid rgba(67,56,202,0.15);color:var(--accent-primary);padding:12px 20px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;transition:all 0.2s;">Save to Bookmarks</button>
                    <select onchange="updateProgress(${courseId}, this.value)" id="progressSelect" style="flex:1;min-width:180px;background:#fff;border:1px solid var(--border);color:var(--text-primary);padding:12px 16px;border-radius:10px;font-size:14px;cursor:pointer;">
                        <option value="not_started">Not Started</option>
                        <option value="in_progress">In Progress</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>`;
        }

        function getSkillsByStream(stream) {
            const map = {
                'Science': ['Problem Solving', 'Programming', 'Data Analysis', 'Research Methods', 'Critical Thinking'],
                'Commerce': ['Financial Analysis', 'Business Management', 'Accounting', 'Economics', 'Communication'],
                'Humanities': ['Critical Thinking', 'Communication', 'Research', 'Writing', 'Cultural Awareness'],
                'Medical': ['Clinical Diagnosis', 'Patient Care', 'Anatomy & Physiology', 'Pharmacology', 'Medical Ethics', 'Emergency Medicine'],
                'Defence': ['Leadership', 'Strategic Planning', 'Physical Fitness', 'Weapons Systems', 'Military Tactics', 'Team Command']
            };
            return map[stream] || ['Problem Solving', 'Analysis', 'Communication'];
        }

        function getYouTubeLink(name) {
            return 'https://www.youtube.com/results?search_query=' + encodeURIComponent(name + ' course details career scope India');
        }

        function goBack() { window.history.back(); }

        // rating stuff
        let selectedStars = 0;
        const userId = localStorage.getItem('userId') || sessionStorage.getItem('userId');

        function setRating(n) {
            selectedStars = n;
            document.querySelectorAll('#starRating .star').forEach(s => {
                s.style.opacity = parseInt(s.dataset.star) <= n ? '1' : '0.3';
                s.style.transform = parseInt(s.dataset.star) <= n ? 'scale(1.15)' : 'scale(1)';
            });
        }

        async function submitRating(courseId) {
            if (!userId) { alert('Please log in first'); return; }
            if (!selectedStars) { alert('Please select a star rating'); return; }
            const review = document.getElementById('reviewText')?.value || '';
            const res = await fetch('/api/ratings', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ userId, courseId, stars: selectedStars, review }) });
            const data = await res.json();
            if (data.success) { loadRatings(courseId); }
        }

        async function loadRatings(courseId) {
            const res = await fetch(`/api/ratings/${courseId}`).then(r => r.json());
            if (res.success) {
                const avg = document.getElementById('avgRating');
                if (avg) avg.innerHTML = `<strong style="font-size:19px;color:#f59e0b;">${'&#9733;'.repeat(Math.round(res.averageStars))}</strong> <span style="color:#6b7280;">${res.averageStars} / 5 (${res.totalRatings} ratings)</span>`;
                const list = document.getElementById('reviewsList');
                if (list) list.innerHTML = res.ratings.filter(r => r.review).slice(0, 5).map(r => `
                    <div style="padding:11px;border-top:1px solid var(--border);font-size:13px;">
                        <span style="color:#f59e0b;">${'&#9733;'.repeat(r.stars)}</span>
                        <span style="color:#6b7280;margin-left:7px;">${r.user_name || r.email.split('@')[0]}</span>
                        <p style="color:var(--text-muted);margin-top:4px;">${r.review}</p>
                    </div>`).join('');
            }
        }

        async function bookmarkCourse(courseId) {
            if (!userId) { alert('Please log in first'); return; }
            const res = await fetch('/api/bookmarks', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ userId, courseId }) });
            const data = await res.json();
            const btn = document.getElementById('bookmarkBtn');
            if (data.success && btn) { btn.textContent = 'Saved!'; btn.style.background = 'rgba(5,150,105,0.08)'; btn.style.color = '#059669'; btn.style.borderColor = 'rgba(5,150,105,0.2)'; }
        }

        async function updateProgress(courseId, status) {
            if (!userId) return;
            await fetch('/api/progress', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ userId, courseId, status }) });
        }

        // load ratings and progress if user is logged in
        if (courseId && userId) {
            setTimeout(() => {
                loadRatings(courseId);
                // Load existing progress
                fetch(`/api/progress/${userId}`).then(r => r.json()).then(data => {
                    if (data.success) {
                        const p = data.progress.find(x => x.course_id == courseId);
                        if (p) { const sel = document.getElementById('progressSelect'); if (sel) sel.value = p.status; }
                    }
                });
            }, 500);
        }
    </script>
    <script src="nav.js"></script>
</body>
</html>
