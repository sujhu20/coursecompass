<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scholarships | Career Course Compass</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',-apple-system,sans-serif}
        body{min-height:100vh;background:#0a0e1a;color:#f1f5f9}
        body::before{content:'';position:fixed;width:500px;height:500px;background:rgba(16,185,129,0.08);border-radius:50%;filter:blur(100px);top:-150px;right:-100px;pointer-events:none}
        .nav{position:sticky;top:0;z-index:100;background:rgba(10,14,26,0.85);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.06);padding:0 32px}
        .nav-inner{max-width:1300px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px}
        .nav-logo{font-size:18px;font-weight:700;background:linear-gradient(135deg,#818cf8,#a78bfa);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
        .nav-links{display:flex;gap:6px;flex-wrap:wrap}
        .nav-links a{color:#94a3b8;text-decoration:none;font-size:13px;font-weight:500;padding:8px 14px;border-radius:8px;transition:all 0.2s}
        .nav-links a:hover,.nav-links a.active{color:#f1f5f9;background:rgba(99,102,241,0.15)}
        .nav-links a.active{color:#a5b4fc}
        .container{max-width:1300px;margin:0 auto;padding:32px;position:relative;z-index:1}
        .page-header{margin-bottom:20px}.page-header h1{font-size:28px;font-weight:700;margin-bottom:6px}
        .page-header h1 span{background:linear-gradient(135deg,#10b981,#34d399);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
        .page-header p{color:#64748b;font-size:14px}
        .filter-row{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap}
        .filter-btn{background:rgba(17,24,39,0.6);border:1px solid rgba(255,255,255,0.08);color:#94a3b8;font-size:13px;padding:8px 18px;border-radius:20px;cursor:pointer;transition:all 0.2s}
        .filter-btn:hover,.filter-btn.active{background:rgba(16,185,129,0.15);color:#34d399;border-color:rgba(16,185,129,0.3)}
        .scholarship-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:16px}
        .sch-card{background:rgba(17,24,39,0.6);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:22px;transition:all 0.3s;position:relative;overflow:hidden}
        .sch-card:hover{border-color:rgba(16,185,129,0.3);transform:translateY(-2px)}
        .sch-card h3{font-size:15px;font-weight:700;color:#f1f5f9;margin-bottom:4px}
        .sch-provider{font-size:12px;color:#64748b;margin-bottom:10px}
        .sch-amount{display:inline-block;background:rgba(16,185,129,0.12);color:#34d399;font-size:14px;font-weight:700;padding:6px 14px;border-radius:20px;margin-bottom:10px}
        .sch-card p{font-size:13px;color:#94a3b8;line-height:1.5;margin-bottom:12px}
        .sch-meta{display:flex;flex-direction:column;gap:4px}
        .sch-meta-item{font-size:12px;color:#64748b}
        .sch-meta-item strong{color:#94a3b8}
        .stream-tag{position:absolute;top:16px;right:16px;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px}
        .stream-tag.Science{background:rgba(59,130,246,0.15);color:#60a5fa}
        .stream-tag.Commerce{background:rgba(16,185,129,0.15);color:#34d399}
        .stream-tag.Humanities{background:rgba(245,158,11,0.15);color:#fbbf24}
        .stream-tag.All{background:rgba(168,85,247,0.15);color:#c084fc}
        @media(max-width:768px){.container{padding:16px}.scholarship-grid{grid-template-columns:1fr}.nav-links{display:none}}
    </style>
<link rel="icon" type="image/svg+xml" href="logo.svg">
</head>
<body>
    <div id="navbar-container"></div>
    <div class="container">
        <div class="page-header">
            <h1>🎓 <span>Scholarships</span></h1>
            <p>Government and private scholarships to fund your education</p>
        </div>
        <div class="filter-row">
            <button class="filter-btn active" onclick="loadScholarships('',this)">All</button>
            <button class="filter-btn" onclick="loadScholarships('Science',this)">🔬 Science</button>
            <button class="filter-btn" onclick="loadScholarships('Commerce',this)">💼 Commerce</button>
            <button class="filter-btn" onclick="loadScholarships('Humanities',this)">📖 Humanities</button>
        </div>
        <div class="scholarship-grid" id="schGrid"></div>
    </div>
    <script>
        if (!(localStorage.getItem('userId')||sessionStorage.getItem('userId'))) window.location.href='login.html';
        async function loadScholarships(stream, el) {
            document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
            if (el) el.classList.add('active'); else document.querySelector('.filter-btn').classList.add('active');
            const url = stream ? `/api/scholarships?stream=${stream}` : '/api/scholarships';
            const res = await fetch(url).then(r=>r.json());
            if (res.success) {
                document.getElementById('schGrid').innerHTML = res.scholarships.map(s=>`
                    <div class="sch-card">
                        <span class="stream-tag ${s.stream}">${s.stream}</span>
                        <h3>${s.name}</h3>
                        <div class="sch-provider">${s.provider}</div>
                        <div class="sch-amount">💰 ${s.amount}</div>
                        <p>${s.description}</p>
                        <div class="sch-meta">
                            <div class="sch-meta-item">🎯 <strong>Eligibility:</strong> ${s.eligibility}</div>
                            <div class="sch-meta-item">📅 <strong>Deadline:</strong> ${s.deadline}</div>
                        </div>
                    </div>`).join('');
            }
        }
        async function logout() {
            try { await fetch('/logout'); } catch(e){}
            localStorage.clear();
            sessionStorage.clear();
            window.location.href = 'login.html';
        }
        loadScholarships('');
    </script>
    <script src="nav.js"></script>
</body>
</html>
